# Breakfast (Kuehne et al., 2014) -- 1,712 videos, 48 classes, 30s-5min / video.
dataset: breakfast
sample_rate: 1
background_class_ids: [0]          # "SIL" (silence/background) action
num_layers: 10
num_f_maps: 64
features_dim: 1024
num_stages: 3
channel_mask_rate: 0.3
epochs: 100
lr: 0.0001                         # paper Sec. 4.1.2: general default 1e-4
gamma: 0.5
temperature: 2.0
refine_threshold: 0.7
